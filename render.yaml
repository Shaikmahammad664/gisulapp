services:
  - type: web
    name: gisul-backend
    runtime: python
    pythonVersion: 3.11
    rootDir: backend-fastapi
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -b 0.0.0.0:8000 main:app
    envVars:
      - key: SQLALCHEMY_DATABASE_URL
        value: sqlite:///./gisul.db
        scope: run
      - key: SECRET_KEY
        value: change-this-to-a-strong-secret-key-12345
        scope: run
      - key: ALGORITHM
        value: HS256
        scope: run
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "10080"
        scope: run
      - key: PORT
        value: "8000"
        scope: run
