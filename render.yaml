services:
  - type: web
    name: gisul-backend
    runtime: python
    pythonVersion: 3.11
    rootDir: backend-fastapi
    buildCommand: pip install uv && uv pip install --system -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1 --loop asyncio
    envVars:
      - key: SECRET_KEY
        value: change-this-to-a-strong-secret-key-12345
        scope: run
      - key: ALGORITHM
        value: HS256
        scope: run
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "10080"
        scope: run
